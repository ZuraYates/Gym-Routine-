// ── Storage ──
const SK="bg-log-v2";
function loadLog(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch{return{}}}
function saveLog(l){try{localStorage.setItem(SK,JSON.stringify(l))}catch{}}
function todayStr(){return new Date().toISOString().split("T")[0]}
function fmtTime(s){return Math.floor(s/60)+":"+String(s%60).padStart(2,"0")}
function round25(v){return Math.round(v/2.5)*2.5}

function getHistory(dayId,exId,max){
  const log=loadLog(),r=[],sfx="_"+dayId+"_"+exId;
  Object.keys(log).filter(k=>k.endsWith(sfx)).sort().reverse().forEach(k=>{
    if(r.length<(max||6))r.push({date:k.split("_")[0],weight:log[k].weight,reps:log[k].reps});
  });return r;
}
function getLastSession(dayId,exId){
  const log=loadLog(),tk=todayStr(),sfx="_"+dayId+"_"+exId;
  const k=Object.keys(log).filter(k=>k.endsWith(sfx)&&!k.startsWith(tk)).sort().reverse()[0];
  return k?{date:k.split("_")[0],...log[k]}:null;
}
function checkOverload(dayId,exId,repMax){
  if(!repMax)return false;
  const hist=getHistory(dayId,exId,3).filter(x=>x.date!==todayStr());
  return hist.length>=2&&hist[0].reps>=repMax[1]&&hist[1].reps>=repMax[1];
}
